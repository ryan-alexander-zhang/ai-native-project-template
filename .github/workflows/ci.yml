# Build and test everything: the DDD building-block library, then the
# multi-module scaffold reference project that depends on it.
#
# The library reactor is installed to the local .m2 first, so the scaffold
# resolves the aipersimmon-ddd-* SNAPSHOTs it imports via the BOM.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and install the building-block library
        run: mvn -B --no-transfer-progress -f aipersimmon-ddd/pom.xml install

      - name: Build the scaffold reference project
        run: |
          # multi-module runs the full quality gate (Spotless + PMD/SpotBugs + domain
          # coverage/mutation) via `verify`.
          mvn -B --no-transfer-progress -f aipersimmon-ddd-scaffold/multi-module/pom.xml verify
