name: bc-and-layer-samples

# Trimmed from the reference stack: only the middleware the samples actually
# exercise — Postgres (DB via MyBatis-Plus), Kafka (integration events), and
# WireMock (the real external HTTP dependency). Observability (SigNoz/OTel) is
# intentionally omitted. Apps run on the host and reach these via localhost.

services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: samples
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18 image uses a versioned PGDATA under /var/lib/postgresql.
      - samples_db_data:/var/lib/postgresql
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "samples"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r9
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no ZooKeeper)
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - samples_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: ["--global-response-templating", "--verbose"]

volumes:
  samples_db_data:
  samples_kafka_data:
