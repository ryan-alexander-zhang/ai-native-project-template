server:
  port: 8082

spring:
  application:
    name: structure-2-multimodule
  datasource:
    url: jdbc:postgresql://localhost:5432/samples?currentSchema=s2_ordering
    username: postgres
    password: postgres
  flyway:
    enabled: true
    schemas: [s2_ordering, s2_inventory]
    default-schema: s2_ordering
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

samples:
  pricing-base-url: http://localhost:8089
  order-placed-topic: s2.order-placed
  stock-result-topic: s2.stock-result

logging:
  level:
    com.acme.samples: INFO
