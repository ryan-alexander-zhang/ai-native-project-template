# Test-only overrides, merged over the main application.yml (a test application.yml would shadow it
# entirely — a .properties file merges instead).
#
# The acceptance tests run without a SigNoz collector, so disable the OpenTelemetry SDK: no OTLP
# exporter is created, nothing tries to reach localhost:44317, and context shutdown has no export
# flush to wait on. The aipersimmon observability starter then binds to a no-op OpenTelemetry — the
# domain spine stays silent, which is what we want here (connected-trace behaviour is asserted with
# an in-memory exporter in the library's own ConnectedTraceEndToEndTest, not against real infra).
otel.sdk.disabled=true
