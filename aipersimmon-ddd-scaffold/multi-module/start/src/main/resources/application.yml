# Tomcat runs on 8090: kafka-ui in compose.yaml publishes host port 8080.
server:
  port: 8090

spring:
  application:
    name: ordering
  # Local infrastructure (PostgreSQL + Kafka) is started from compose.yaml by Spring Boot's
  # docker-compose support. start-only means the app boots the containers but does NOT tear them
  # down on exit, so `mvn spring-boot:run` iterations are fast and the SigNoz stack (behind the
  # `observability` compose profile, started out-of-band with `docker compose --profile observability
  # up -d`) is left untouched. The DataSource and Kafka bootstrap-servers are auto-wired from the
  # running compose services; tests skip compose (spring.docker.compose.skip.in-tests=true) and use
  # Testcontainers instead.
  docker:
    compose:
      lifecycle-management: start-only
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    # More than one consumer thread so a slow/retrying record on one partition does not stall the
    # others: the integration-event bridge consumes several bounded contexts' topics, and blocking
    # retries (issue-00030) would otherwise let one context's backoff delay the rest. Threads are
    # capped by the partition count, so idle threads simply stay unassigned.
    listener:
      concurrency: 3

# OpenAPI / Swagger UI (springdoc, via aipersimmon-ddd-openapi-spring-boot-starter). The JSON
# contract is always served at /v3/api-docs; the interactive Swagger UI at /swagger-ui.html is gated
# so a production profile can expose the contract without the UI. Default on for local dev — override
# SWAGGER_UI_ENABLED=false (or set springdoc.swagger-ui.enabled=false in a prod profile) to hide it.
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

aipersimmon:
  ddd:
    # CloudEvents `source` stamped on every published integration event (decision-00014).
    integration:
      source: ${spring.application.name}
    # The shared Flyway starter applies each component's schema on its own history table
    # (flyway_schema_history_aipersimmon_<component>): the four process-manager tables, the
    # outbox + dead-letter + shedlock tables, and the inbox table. PostgreSQL in dev
    # (docker-compose), Testcontainers in tests.
    flyway:
      components:
        - process-manager
        - outbox
        - inbox
    # Integration events cross bounded contexts over Kafka (decision-00006 transport "方式三").
    # Routing is per event (design-00006): each @Externalized event goes to its own named topic
    # (ordering.events / inventory.events / payment.events), and an event with no @Externalized
    # stays in process. The record key is the aggregate subject (per-aggregate ordering);
    # identity/type rides in ce_* headers. consumer.enabled registers the inbox-guarded consumer
    # bridge that subscribes to those topics and republishes each event in process.
    messaging:
      kafka:
        consumer:
          enabled: true

# OpenTelemetry export to the SigNoz otel-collector. In dev the collector listens on the host at
# 44317 (gRPC) / 44318 (HTTP) — see compose.yaml (started with the `observability` profile). These
# are the standard OTel SDK autoconfigure knobs read by the opentelemetry-spring-boot-starter; the
# aipersimmon observability starter binds the domain spine (command / process.advance / outbox.publish
# spans) to the same OpenTelemetry instance. Tests disable the SDK (no collector there).
otel:
  service:
    name: ${spring.application.name}
  # Bridge the app's Micrometer meters onto the OpenTelemetry SDK so they export over OTLP alongside
  # the traces. Without this the OTEL starter exports only its own instrumentation metrics (jvm.*,
  # http.server.*), and the library's Micrometer SLIs — notably the process-manager gauges
  # (aipersimmon.process.manager.*) the "Aipersimmon DDD · Process Manager" dashboard reads — never
  # reach SigNoz. Also brings hikaricp/executor/tomcat meters across.
  instrumentation:
    micrometer:
      enabled: true
  exporter:
    otlp:
      endpoint: http://localhost:44317
      protocol: grpc
  # Export logs as OTLP too (not just traces): the logback OpenTelemetryAppender (attached in
  # logback-spring.xml, SDK installed by the aipersimmon observability starter) emits each log as a
  # LogRecord to the same collector endpoint above, stamped with the active trace_id/span_id so logs
  # correlate to traces in SigNoz. Tests disable the SDK, so nothing is exported there.
  logs:
    exporter: otlp

# Console logs are structured ECS JSON (Elastic Common Schema) — Spring Boot 3.4+ built-in
# StructuredLogEncoder (see logback-spring.xml). These labels ride on every record so SigNoz / any
# ECS-aware store can filter by service + environment + node.
logging:
  structured:
    ecs:
      service:
        environment: local
        node-name: ${HOSTNAME:localhost}
