spring.application.name=inventory-service

# Same topic as the ordering service, a distinct consumer group. This service
# consumes OrderPlaced and publishes StockReserved / StockReservationFailed, all
# over the transactional outbox and inbox.
aipersimmon.ddd.messaging.kafka.topic=shop.integration-events
aipersimmon.ddd.messaging.kafka.consumer.enabled=true

# Integration events live in the shared `contracts` module, outside this service's
# base package, so the type resolver must be told to scan it (the auto-configuration
# packages cover only com.example.inventory).
aipersimmon.ddd.integration.scan-packages=com.example.contracts

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=inventory-service
spring.kafka.consumer.auto-offset-reset=earliest

# This service owns its data. The domain is in-memory; a small H2 database backs
# the outbox and inbox tables (created from schema.sql).
spring.datasource.url=jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1
spring.sql.init.mode=always
