# Config for the inventory service when booted inside the end-to-end test
# (spring.config.name=inventory-e2e). Mirrors inventory-service's own
# application.properties; a distinct consumer group and database from ordering.
spring.application.name=inventory-service

aipersimmon.ddd.messaging.kafka.topic=shop.integration-events
aipersimmon.ddd.messaging.kafka.consumer.enabled=true

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=inventory-service
spring.kafka.consumer.auto-offset-reset=earliest

spring.datasource.url=jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1
spring.sql.init.mode=always
