# Config for the ordering service when booted inside the end-to-end test. A
# dedicated config name is used (spring.config.name=ordering-e2e) because both
# service jars are on the e2e test classpath and would otherwise collide on
# application.properties. Mirrors ordering-service's own application.properties.
spring.application.name=ordering-service

aipersimmon.ddd.messaging.kafka.topic=shop.integration-events
aipersimmon.ddd.messaging.kafka.consumer.enabled=true

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=ordering-service
spring.kafka.consumer.auto-offset-reset=earliest

spring.datasource.url=jdbc:h2:mem:ordering;DB_CLOSE_DELAY=-1
spring.sql.init.mode=always
