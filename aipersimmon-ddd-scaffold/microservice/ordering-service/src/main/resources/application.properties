spring.application.name=ordering-service

# Reliable integration events over Kafka: publish via the outbox, consume with the
# inbox-guarded bridge. Both services share one topic and use distinct consumer
# groups, so each receives every message and reacts only to the events it handles.
aipersimmon.ddd.messaging.kafka.topic=shop.integration-events
aipersimmon.ddd.messaging.kafka.consumer.enabled=true

# Integration events live in the shared `contracts` module, outside this service's
# base package, so the type resolver must be told to scan it (the auto-configuration
# packages cover only com.example.ordering).
aipersimmon.ddd.integration.scan-packages=com.example.contracts

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=ordering-service
spring.kafka.consumer.auto-offset-reset=earliest

# This service owns its data. The domain is in-memory; a small H2 database backs
# the outbox and inbox tables (created from schema.sql).
spring.datasource.url=jdbc:h2:mem:ordering;DB_CLOSE_DELAY=-1
spring.sql.init.mode=always
