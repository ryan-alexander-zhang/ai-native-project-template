# Tests reuse the shipped outbox Flyway migration (from aipersimmon-ddd-outbox) as the single
# source of the schema, instead of a separate test-only schema.sql. Spring Boot's spring.sql.init
# runs it against the embedded H2 database on startup.
spring.sql.init.schema-locations=classpath:aipersimmon/db/migration/outbox/h2/V1__aipersimmon_outbox.sql,classpath:aipersimmon/db/migration/outbox/h2/V2__drop_trace_id.sql
