# Tests reuse the shipped process-manager Flyway migration (from aipersimmon-ddd-process-manager-engine)
# as the single source of the schema. Spring Boot's spring.sql.init runs it against the embedded H2
# database on startup, before the @DependsOnDatabaseInitialization schema validator.
spring.sql.init.schema-locations=classpath:aipersimmon/db/migration/process-manager/h2/V1__aipersimmon_process_manager.sql,classpath:aipersimmon/db/migration/process-manager/h2/V2__drop_trace_id.sql
