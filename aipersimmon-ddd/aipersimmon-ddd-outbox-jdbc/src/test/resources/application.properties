# Tests reuse the shipped H2 Flyway migration as the single source of the outbox schema,
# instead of a separate test-only schema.sql that could drift from it. Spring Boot's
# spring.sql.init runs this against the embedded H2 database on context startup.
spring.sql.init.schema-locations=classpath:aipersimmon/db/migration/outbox/h2/V1__aipersimmon_outbox.sql,classpath:aipersimmon/db/migration/outbox/h2/V2__drop_trace_id.sql
